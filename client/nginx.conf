server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker / manifest should never be cached aggressively
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — client uses BrowserRouter, so any unknown path must
    # still serve index.html and let React Router handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
