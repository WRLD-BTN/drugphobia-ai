version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: "http://localhost:8080,http://localhost:8081"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in your .env before running}
      SQLITE_PATH: /app/data/drugphobia.db
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_MODEL: ${LLM_MODEL:-llama-3-8b-instruct}
    volumes:
      - drugphobia_data:/app/data
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_SERVER_URL: ${PUBLIC_SERVER_URL:-http://localhost:4000}
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_SERVER_URL: ${PUBLIC_SERVER_URL:-http://localhost:4000}
    ports:
      - "8081:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  drugphobia_data:
